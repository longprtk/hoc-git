name: Website CI CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cai thu vien
        run: pip install -r requirements.txt

      - name: Chay test website
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Chuan bi thu muc public
        run: |
          mkdir public
          cp index.html public/
          cp style.css public/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy len GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4